<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Search API - Cliente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-section {
            margin-bottom: 30px;
        }

        .result-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .date-group {
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .date-group h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .flight-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
        }

        .flight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .flight-info {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .leg {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .leg-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .health-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .health-status.healthy {
            background: #d4edda;
            color: #155724;
        }

        .health-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Flight Search API</h1>
            <p>Busque voos com flexibilidade de datas</p>
            <div id="health-status"></div>
        </div>

        <div class="card">
            <form id="search-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="from">🛫 De (Código IATA)</label>
                        <input type="text" id="from" value="NAT" required maxlength="3" placeholder="Ex: NAT, GRU, JFK">
                    </div>
                    <div class="form-group">
                        <label for="to">🛬 Para (Código IATA)</label>
                        <input type="text" id="to" value="MVD" required maxlength="3" placeholder="Ex: MVD, LAX, LHR">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="departDate">📅 Data de Ida</label>
                        <input type="date" id="departDate" value="2026-11-25" required>
                    </div>
                    <div class="form-group">
                        <label for="returnDate">📅 Data de Volta (opcional)</label>
                        <input type="date" id="returnDate" value="2026-11-30">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cabinClass">💺 Classe</label>
                        <select id="cabinClass">
                            <option value="ECONOMY">Econômica</option>
                            <option value="PREMIUM_ECONOMY">Econômica Premium</option>
                            <option value="BUSINESS">Executiva</option>
                            <option value="FIRST">Primeira Classe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="maxStops">🛑 Paradas</label>
                        <select id="maxStops">
                            <option value="ANY">Qualquer</option>
                            <option value="NON_STOP">Sem paradas</option>
                            <option value="ONE_STOP_OR_FEWER">Máximo 1 parada</option>
                            <option value="TWO_OR_FEWER_STOPS">Máximo 2 paradas</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="passengers">👥 Passageiros</label>
                    <input type="number" id="passengers" value="1" min="1" max="9">
                </div>

                <button type="submit" id="search-btn">🔍 Buscar Voos</button>
            </form>
        </div>

        <div id="loading" class="card loading" style="display: none;">
            <div class="spinner"></div>
            <p>Buscando voos... Isso pode levar alguns minutos.</p>
        </div>

        <div id="error" class="card" style="display: none;">
            <div class="error"></div>
        </div>

        <div id="results" class="card results">
            <div id="results-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Verifica health ao carregar
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                const statusEl = document.getElementById('health-status');
                if (data.status === 'healthy') {
                    statusEl.innerHTML = '<span class="health-status healthy">✅ API Online</span>';
                } else {
                    statusEl.innerHTML = '<span class="health-status error">❌ API Offline</span>';
                }
            } catch (error) {
                const statusEl = document.getElementById('health-status');
                statusEl.innerHTML = '<span class="health-status error">❌ API Offline</span>';
            }
        }

        // Formata data para exibição
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        // Formata duração
        function formatDuration(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}h ${mins}min`;
        }

        // Renderiza resultados
        function renderResults(data) {
            const content = document.getElementById('results-content');
            let html = `<h2>📊 Resultados (${data.total_results} voos encontrados)</h2>`;

            // Voos de ida
            html += '<div class="result-section"><h3>🛫 Voos de Ida</h3>';
            data.outbound_flights.forEach(dateGroup => {
                html += `<div class="date-group">
                    <h4>📅 ${formatDate(dateGroup.date)} (${dateGroup.flights.length} voos)</h4>`;
                
                dateGroup.flights.forEach((flight, idx) => {
                    html += `<div class="flight-card">
                        <div class="flight-header">
                            <div class="price">${flight.currency} ${flight.price.toFixed(2)}</div>
                            <div class="flight-info">
                                <span>⏱️ ${formatDuration(flight.duration_minutes)}</span>
                                <span>🛑 ${flight.stops} parada(s)</span>
                            </div>
                        </div>`;
                    
                    flight.legs.forEach((leg, legIdx) => {
                        html += `<div class="leg">
                            <div class="leg-header">✈️ ${leg.airline} ${leg.flight_number}</div>
                            <div>🛫 ${new Date(leg.departure_datetime).toLocaleString('pt-BR')} - ${leg.departure_airport}</div>
                            <div>🛬 ${new Date(leg.arrival_datetime).toLocaleString('pt-BR')} - ${leg.arrival_airport}</div>
                        </div>`;
                    });
                    
                    html += '</div>';
                });
                
                html += '</div>';
            });
            html += '</div>';

            // Voos de volta
            if (data.return_flights) {
                html += '<div class="result-section"><h3>🛬 Voos de Volta</h3>';
                data.return_flights.forEach(dateGroup => {
                    html += `<div class="date-group">
                        <h4>📅 ${formatDate(dateGroup.date)} (${dateGroup.flights.length} voos)</h4>`;
                    
                    dateGroup.flights.forEach((flight, idx) => {
                        html += `<div class="flight-card">
                            <div class="flight-header">
                                <div class="price">${flight.currency} ${flight.price.toFixed(2)}</div>
                                <div class="flight-info">
                                    <span>⏱️ ${formatDuration(flight.duration_minutes)}</span>
                                    <span>🛑 ${flight.stops} parada(s)</span>
                                </div>
                            </div>`;
                        
                        flight.legs.forEach((leg, legIdx) => {
                            html += `<div class="leg">
                                <div class="leg-header">✈️ ${leg.airline} ${leg.flight_number}</div>
                                <div>🛫 ${new Date(leg.departure_datetime).toLocaleString('pt-BR')} - ${leg.departure_airport}</div>
                                <div>🛬 ${new Date(leg.arrival_datetime).toLocaleString('pt-BR')} - ${leg.arrival_airport}</div>
                            </div>`;
                        });
                        
                        html += '</div>';
                    });
                    
                    html += '</div>';
                });
                html += '</div>';
            }

            content.innerHTML = html;
            document.getElementById('results').classList.add('show');
        }

        // Submete formulário
        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                from: document.getElementById('from').value.toUpperCase(),
                to: document.getElementById('to').value.toUpperCase(),
                departDate: document.getElementById('departDate').value,
                returnDate: document.getElementById('returnDate').value || null,
                cabinClass: document.getElementById('cabinClass').value,
                maxStops: document.getElementById('maxStops').value,
                passengers: parseInt(document.getElementById('passengers').value)
            };

            // Remove returnDate se vazio
            if (!formData.returnDate) {
                delete formData.returnDate;
            }

            // Mostra loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('results').classList.remove('show');
            document.getElementById('search-btn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Erro ao buscar voos');
                }

                const data = await response.json();
                renderResults(data);

            } catch (error) {
                document.getElementById('error').style.display = 'block';
                document.querySelector('.error').textContent = `❌ ${error.message}`;
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('search-btn').disabled = false;
            }
        });

        // Verifica health ao carregar
        checkHealth();
    </script>
</body>
</html>
